groups:
  - name: carindex_alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for 5 minutes"

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time"
          description: "95th percentile response time is above 1 second"

      - alert: LowDataFreshness
        expr: time() - last_listing_update_timestamp > 86400
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Data freshness issue"
          description: "No new listings updated in the last 24 hours"

      - alert: DatabaseConnectionIssues
        expr: pg_stat_database_numbackends > 80
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Database connections are above 80"









